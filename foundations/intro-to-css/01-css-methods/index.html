<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Methods for Adding CSS</title>
    <link rel="stylesheet" href="solution.css">

    <style>
      div#internal{
        background-color: brown;
        color: rgb(0, 255, 149);
        margin-left: 3%;
        margin-right: 3%;
      }
      p{
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <div id="external">Style me via the external method!</div>
    <div id="internal"><p>I would like to be styled with the internal method, please.</p></div>
    <button style="background-color: blue; margin-left:3%; margin-right: 3%;">
      Inline Method
    </button>
  </body>
</html>
